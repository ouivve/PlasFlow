services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - PLASFLOW_RUNS_DIR=/app/runs
      - PLASFLOW_MAX_WORKERS=2
    volumes:
      - ./runs:/app/runs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=/api/v1
      - VITE_PROXY_TARGET=http://api:8080
    depends_on:
      api:
        condition: service_healthy
