name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,train]"

      - name: Run Pytest
        run: pytest -q

  accuracy-gate:
    name: Accuracy Gate (Modern vs Baseline)
    runs-on: ubuntu-latest
    needs: python-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,train]"

      - name: Run Benchmark
        run: |
          python scripts/run_modern_benchmark.py \
            --dataset-manifest tests/fixtures/benchmark/benchmark_manifest.json \
            --outdir runs/ci_benchmark \
            --threshold 0.7

      - name: Enforce Macro-F1 Delta
        run: |
          python scripts/check_accuracy_gate.py \
            --baseline runs/ci_benchmark/baseline_eval.json \
            --candidate runs/ci_benchmark/candidate_eval.json \
            --min-delta 0.0 \
            --min-candidate 0.30

      - name: Upload Accuracy Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-benchmark
          path: runs/ci_benchmark
          if-no-files-found: ignore

  web-e2e:
    name: Web E2E (Docker + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plasflow-web/package-lock.json

      - name: Install Web Dependencies
        run: npm install --prefix plasflow-web

      - name: Install Playwright Browser
        run: npm run e2e:install --prefix plasflow-web

      - name: Build and Start API/Web
        run: docker compose up -d --build api web

      - name: Wait for Services
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:5173/api/v1/health >/dev/null; then
              echo "Services are ready"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for services"
          docker compose logs api web || true
          exit 1

      - name: Run Playwright E2E
        run: E2E_BASE_URL=http://localhost:5173 npm run e2e:test --prefix plasflow-web

      - name: Show Docker Logs On Failure
        if: failure()
        run: docker compose logs api web || true

      - name: Upload Playwright Report On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            plasflow-web/playwright-report
            plasflow-web/test-results
          if-no-files-found: ignore

      - name: Shutdown Containers
        if: always()
        run: docker compose down -v --remove-orphans
